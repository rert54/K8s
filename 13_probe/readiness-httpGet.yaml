# readiness-httpGet.yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  name: readiness-httpget-pod

spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: nginx-container
        image: nginx:1.14.2
        ports:
        - containerPort: 80

        readinessProbe:
          httpGet:
           path: /ready.html
           port: 80
          initialDelaySeconds: 3
          periodSeconds: 3
          failureThreshold: 3  

---  
apiVersion: v1
kind: Service
metadata:
  name: nginx-clusterip-service
spec:
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 80
  type:
    ClusterIP