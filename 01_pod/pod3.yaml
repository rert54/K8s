# pod3.yaml

apiVersion: v1
kind: Pod
metadata:
  name: pod3
spec:
  containers:
  - name: nginx-container
    image: nginx:1.14.2

  - name: redis-container
    image: redis:latest 

  - name: busybox-container
    image: busybox:1.28
    command: ['sh', '-c', 'echo "Hello, Kubernetes!" && sleep 3600'] 
    imagePullPolicy: IfNotPresent 