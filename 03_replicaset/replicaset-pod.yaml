# replicaset-pod.yaml

apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: rs-pod

spec:
  # modify replicas according to your case
  replicas: 3
  selector:
    matchLabels:
      app: web

  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: nginx-container
        image: nginx:1.14.2
